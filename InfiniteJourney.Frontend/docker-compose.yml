services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infinitejourney-web
    env_file:
      - .env
    environment:
      API_PORT: ${API_PORT:-5274}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-InfiniteJourney}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-infinite-journey-web}
    ports:
      - "${WEB_PORT:-4200}:80"
